---
name: CI

on:
  workflow_dispatch:
  workflow_call:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq yamllint

      - name: Run quality gate
        run: ./scripts/stack.sh quality
